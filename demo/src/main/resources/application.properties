spring.application.name=Student Library Management System

# =============================================================
#  Student Library Access Management System - Application Config
# =============================================================

# ----- Server ------------------------------------------------
server.port=8081
server.servlet.context-path=/

# ----- SQLite DataSource -------------------------------------
# SQLite stores everything in a single file on disk.
# The file will be created at project root as library.db
spring.datasource.url=jdbc:sqlite:library.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# SQLite does not use username/password
spring.datasource.username=
spring.datasource.password=

# ----- JPA / Hibernate ---------------------------------------
# Use the community SQLite dialect (from hibernate-community-dialects)
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

# update: updates existing schema on startup (recommended for production)
# create-drop: drops and re-creates schema on every start (good for dev)
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console during development
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect

# ----- Thymeleaf ---------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ----- Email (SMTP) ------------------------------------------
# Replace with your Gmail credentials.
# For Gmail: enable "App Passwords" under Google Account > Security.
# Steps:
# 1. Enable 2-Factor Authentication on Google Account
# 2. Go to Google Account → Security → App Passwords
# 3. Generate a new app password for "Mail"
# 4. Replace the password below with the 16-character app password
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=swatisaxena12325@gmail.com
spring.mail.password=cuknkrakcobabnsw
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ----- Session Configuration ---------------------------------
server.servlet.session.timeout=30m
spring.session.store-type=none

# ----- Admin Credentials (loaded by DataInitializer) ---------
# Change these before deploying to production!
app.admin.email=admin@library.com
app.admin.password=Admin@123

# ----- Application-level settings ----------------------------
# Base URL used in confirmation email links
app.base-url=http://localhost:8081

# From-address shown on all outgoing emails
app.mail.from=noreply@studentlibrary.com

# ----- Logging -----------------------------------------------
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=INFO